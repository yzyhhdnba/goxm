server:
  host: 0.0.0.0
  port: 8080
  mode: debug

database:
  dsn: pilipili:pilipili@tcp(127.0.0.1:3306)/pilipili_go?charset=utf8mb4&parseTime=True&loc=Local
  max_idle_conns: 5
  max_open_conns: 10
  conn_max_lifetime_minute: 30
  connect_timeout_second: 5

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

jwt:
  access_secret: change-me-access-secret
  refresh_secret: change-me-refresh-secret
  issuer: pilipili-go
  access_ttl_minute: 120
  refresh_ttl_hour: 336

cors:
  allow_origins:
    - http://127.0.0.1:5173
    - http://localhost:5173
    - http://127.0.0.1:8081
    - http://localhost:8081
    - http://127.0.0.1:8083
    - http://localhost:8083
  allow_credentials: true

media:
  root_dir: storage
  public_base_url: /uploads
